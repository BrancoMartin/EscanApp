schema: spec-driven
context: |
  Tech stack: FastAPI, SQLAlchemy, SQLite, React 19, Vite 8, Ollama, LangChain
  Architecture: Layered (API -> Services -> Repositories -> Models)
  Database: SQLite with 6 tables: products, categories, attributes, product_attributes, sales, sale_items
  AI: 9 specialized Ollama models accessed via LangChain
  Frontend (Web): React 19 with Vite 8, react-router-dom, fetch, react-calendar
  Frontend (Mobile): React Native (following Obsidian vault conventions)
  API-first: The backend is a RESTful JSON API consumed by both web and mobile frontends
  HTTP client: All frontend-to-backend HTTP requests MUST use the native fetch API (no axios or other HTTP libraries)
  Currency microservice: A separate C# / .NET microservice using IHttpClientFactory connects to
    exchangerate-api.com. Interface: ICurrencyService (ConvertArsToUsd, GetExchangeRate).
    Implementation: CurrencyService with ExchangeRateResponse model for deserialization.
  API style: RESTful, JSON
  Error handling: Custom InfrastructureError hierarchy (Integrity, Operational, Programming)
  Naming: Spanish for business terms, English for code
  Testing: pytest (verify before creating)
  Project paths:
    Backend API: Backend/api/app.py
    Currency microservice: Backend/CurrencyMicroservice/
    Web frontend: Frontend/
    Mobile frontend: Mobile/
  Constraint:
    - Existing code (brownfield): If the agent finds technologies, libraries,
      functions, or classes in the current codebase that are NOT documented in
      the user's Obsidian vault, it MUST stop and ask the user: "Delete it or
      reimplement it using vault-documented alternatives?"
    - New features: All new functionality MUST be built using ONLY frameworks,
      languages, functions, classes, and libraries that exist in the user's
      Obsidian notes. The agent MUST NOT introduce any resource not present
      in the vault.
    - Code style: El código NO DEBE usar `isinstance()` en ningún archivo.
      En su lugar, usar validaciones con `if` normales como `if type(x) == list:`,
      `if "key" in x:`, `if x is not None:` según corresponda.
      Esta regla aplica a backend Python y frontend JavaScript por igual.

specs:
  products:       specs/products/spec.md
  categories:     specs/categories/spec.md
  sales:          specs/sales/spec.md
  ai-agent:       specs/ai-agent/spec.md
  ui:             specs/ui/spec.md
  timestamps:     specs/timestamps/spec.md
  currency-microservice:  specs/currency-microservice/spec.md
  mobile:  specs/mobile/spec.md
