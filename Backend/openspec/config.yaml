schema: spec-driven
context: |
  Tech stack: FastAPI, SQLAlchemy, SQLite, React 19, Vite 8, Ollama, LangChain
  Architecture: Layered (API -> Services -> Repositories -> Models)
  Database: SQLite with 6 tables: products, categories, attributes, product_attributes, sales, sale_items
  AI: 9 specialized Ollama models accessed via LangChain
  Frontend: React 19 with Vite 8, react-router-dom, axios, react-calendar
  API style: RESTful, JSON
  Error handling: Custom InfrastructureError hierarchy (Integrity, Operational, Programming)
  Naming: Spanish for business terms, English for code
  Testing: pytest (verify before creating)
  Constraint:
    - Existing code (brownfield): If the agent finds technologies, libraries,
      functions, or classes in the current codebase that are NOT documented in
      the user's Obsidian vault, it MUST stop and ask the user: "Delete it or
      reimplement it using vault-documented alternatives?"
    - New features: All new functionality MUST be built using ONLY frameworks,
      languages, functions, classes, and libraries that exist in the user's
      Obsidian notes. The agent MUST NOT introduce any resource not present
      in the vault.

specs:
  products:       specs/products/spec.md
  categories:     specs/categories/spec.md
  sales:          specs/sales/spec.md
  ai-agent:       specs/ai-agent/spec.md
  ui:             specs/ui/spec.md
  timestamps:     specs/timestamps/spec.md
  product-stock:  specs/product-stock/spec.md
